<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página Personal - prueba</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #1f2937;
            color: white;
            text-align: center;
            padding: 40px;
        }

        nav {
            background-color: #374151;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }

        section {
            max-width: 900px;
            margin: 30px auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
        }

        .card {
            background-color: #eef2ff;
            padding: 15px;
            margin-top: 15px;
            border-radius: 5px;
        }

        footer {
            background-color: #1f2937;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bienvenido a Mi Página Personal</h1>
        <p>Aprendiendo Git y GitHub 🚀</p>
    </header>

    <nav>
        <a href="#">Inicio</a>
        <a href="#">Acerca de</a>
        <a href="#">Proyectos</a>
        <a href="#">Contacto</a>
    </nav>

    <section>
        <h2>Sobre mí</h2>
        <p>
            Esta es mi primera página web publicada utilizando Git y GitHub.
        </p>

        <div class="card">
            <h3>Proyecto 1</h3>
            <p>Aplicación web de ejemplo.</p>
        </div>

        <div class="card">
            <h3>Proyecto 2</h3>
            <p>Prácticas de ramas y control de versiones.</p>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 - Flor Padilla</p>
    </footer>

</body>
</html>
